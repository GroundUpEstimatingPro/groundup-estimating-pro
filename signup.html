<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign Up | GroundUp Estimating Pro</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #eef4ff;
      color: #10203d;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 20px 50px rgba(16,32,61,.08);
    }
    h1 { margin-top: 0; }
    input, button {
      width: 100%;
      padding: 0.9rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(16,32,61,.12);
      margin-top: 0.8rem;
      box-sizing: border-box;
    }
    button {
      background: #1696c4;
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    .muted { color: #60708e; font-size: 0.95rem; }
    .msg { margin-top: 1rem; font-size: 0.95rem; }
    a { color: #2f62f5; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create account</h1>
    <p class="muted">Start your contractor workspace.</p>

    <input id="full_name" placeholder="Full name" />
    <input id="company_name" placeholder="Company name" />
    <input id="email" type="email" placeholder="Work email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="signupBtn">Create account</button>

    <div class="msg" id="message"></div>
    <p class="muted">Already have an account? <a href="/login.html">Log in</a></p>
  </div>

  <script type="module">
    import { supabase } from "/supabase-client.js";

    const btn = document.getElementById("signupBtn");
    const msg = document.getElementById("message");

    btn.addEventListener("click", async () => {
      msg.textContent = "Creating account...";

      const full_name = document.getElementById("full_name").value.trim();
      const company_name = document.getElementById("company_name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { full_name, company_name }
        }
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      msg.textContent = "Account created. Check your email to confirm signup.";
    });
  </script>
</body>
</html>
