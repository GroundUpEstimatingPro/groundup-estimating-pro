<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard | GroundUp Estimating Pro</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      background: #eef4ff;
      color: #10203d;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .card {
      margin-top: 1.2rem;
      background: white;
      border-radius: 20px;
      padding: 1.4rem;
      box-shadow: 0 20px 50px rgba(16,32,61,.08);
    }
    button, a.btn {
      background: #1696c4;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Dashboard</h1>
      <div>
        <a class="btn" href="/projects.html">Projects</a>
        <button id="logoutBtn">Log out</button>
      </div>
    </div>

    <div class="card">
      <h2>Welcome to GroundUp Estimating Pro</h2>
      <p id="userInfo">Loading...</p>
    </div>
  </div>

  <script type="module">
    import { supabase } from "/supabase-client.js";

    const { data } = await supabase.auth.getUser();

    if (!data.user) {
      window.location.href = "/login.html";
    } else {
      document.getElementById("userInfo").textContent =
        `Signed in as ${data.user.email}`;
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "/login.html";
    });
  </script>
</body>
</html>
